services:
  postgres:
    image: postgres:16-alpine
    container_name: quick-chat-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: root
      POSTGRES_DB: quick_chat_db
    ports:
      - '5432:5432'
    volumes:
      - quick_chat_postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: quick-chat-redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - quick_chat_redis_data:/data

volumes:
  quick_chat_postgres_data:
  quick_chat_redis_data: